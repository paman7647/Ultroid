# LiveKit Server Configuration
# https://docs.livekit.io/server/deploy/config/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
  tcp_port: 7881

redis:
  address: redis:6379

keys:
  # CHANGE THESE in production — use `livekit-server generate-keys`
  devkey: secret

turn:
  enabled: true
  domain: localhost
  tls_port: 0
  udp_port: 7882
  external_tls: false

logging:
  level: info
  json: true
