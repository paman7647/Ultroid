# coturn TURN server configuration
# For WebRTC NAT traversal

listening-port=3478
tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=65535

# Authentication
# CHANGE these credentials in production
realm=qweb.local
user=qweb:qweb_turn_secret

# Logging
log-file=/var/log/coturn.log
verbose

# Security
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
no-tcp-relay

# Quota
total-quota=100
stale-nonce=600
