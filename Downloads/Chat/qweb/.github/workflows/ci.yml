name: CI

on:
  push:
    branches: [main, develop, 'codex/**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  python-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r services/ai-python/requirements.txt

      - name: Python syntax check
        run: python -m py_compile services/ai-python/app/main.py

  docker-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t qweb-api:ci .

      - name: Build Worker image
        run: docker build -f apps/worker/Dockerfile -t qweb-worker:ci .

      - name: Build Python service image
        run: docker build -f services/ai-python/Dockerfile -t qweb-ai-python:ci .
