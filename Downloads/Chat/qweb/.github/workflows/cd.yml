name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/qweb-api
            ghcr.io/${{ github.repository }}/qweb-web
            ghcr.io/${{ github.repository }}/qweb-worker

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/qweb-api:${{ github.ref_name }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/qweb-web:${{ github.ref_name }}

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/qweb-worker:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Init/Plan
        run: |
          cd infra/terraform/envs/prod
          terraform init
          terraform plan

      - name: Deploy placeholder
        run: echo "Attach your cloud deploy script or ArgoCD trigger here"
